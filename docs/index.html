<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>龙首谷1号仓库</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="topbar">
    <h1 id="title">库存清单</h1>
    <span class="count" id="count"></span>
    <span class="status-dot" id="statusDot" title="未配置写入"></span>
  </div>

  <!-- 库存页 -->
  <section class="page active" id="page-inv">
    <div class="searchbar"><input id="search" type="search" placeholder="搜索名称 / 位置 / 备注…"></div>
    <div class="list" id="invList"></div>
  </section>

  <!-- 留言板页 -->
  <section class="page" id="page-msg">
    <div class="msg-list" id="msgList"></div>
    <div class="msg-compose">
      <button class="attach" id="msgAttach" title="加图片">📎</button>
      <input type="file" id="msgFiles" accept="image/*" multiple hidden>
      <textarea id="msgText" rows="1" placeholder="给 agent 留言（可带图片）…"></textarea>
      <button class="send" id="msgSend">➤</button>
    </div>
  </section>

  <!-- 设置页 -->
  <section class="page" id="page-set">
    <div class="settings">
      <h2 style="margin-bottom:14px;">设置</h2>
      <p class="hint"><strong>看库存、看留言、发留言</strong>都不用配置。只有<strong>改库存 / 加物料 / 上传照片</strong>才需要下面的<strong>编辑密码</strong>。所有写入都经服务器代理，浏览器不接触 GitHub token。设置只存在这台设备。</p>
      <div class="field"><label>Worker 地址（已内置时可留空）</label><input id="cfgWorker" placeholder="https://xxx.workers.dev"></div>
      <div class="field"><label>编辑密码（改库存时需要）</label><input id="cfgPassword" type="password" placeholder="输入编辑密码"></div>
      <div class="btns">
        <button class="btn ghost" id="cfgTest">测试</button>
        <button class="btn primary" id="cfgSave">保存</button>
      </div>
      <p class="hint" id="cfgStatus"></p>
    </div>
  </section>

  <!-- 底部 tab -->
  <nav class="tabbar">
    <button data-tab="inv" class="active"><span class="ic">📦</span>库存</button>
    <button data-tab="msg"><span class="ic">💬</span>留言板</button>
    <button data-tab="set"><span class="ic">⚙️</span>设置</button>
  </nav>

  <button class="fab" id="fabAdd">＋</button>

  <!-- 编辑/详情弹层 -->
  <div class="sheet-mask" id="sheetMask"></div>
  <div class="sheet" id="sheet"></div>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
